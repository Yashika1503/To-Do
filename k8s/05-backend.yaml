# ── Backend Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2                    # Start with 2; HPA will scale up/down
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: todo-backend:latest   # ← replace with your image name/tag
          imagePullPolicy: IfNotPresent  # use local image in Minikube
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: todo-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: DB_PASSWORD
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: RAZORPAY_KEY_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_CALLBACK_URL
              value: "http://127.0.0.1:46413/auth/google/callback"
            - name: FRONTEND_URL
              value: "http://127.0.0.1:28747"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"       # HPA targets this to decide when to scale
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# ── Backend Service (ClusterIP — frontend talks to this) ──────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000

---
# ── Backend NodePort (expose outside cluster for dev/testing) ─────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30002       # Access at http://<minikube-ip>:30000