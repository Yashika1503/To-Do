# Run this ONCE after postgres is ready to initialize the schema.
# kubectl apply -f 07-schema-job.yaml
# kubectl wait --for=condition=complete job/schema-init -n todo-app --timeout=60s
apiVersion: batch/v1
kind: Job
metadata:
  name: schema-init
  namespace: todo-app
spec:
  ttlSecondsAfterFinished: 120   # auto-delete job pod after 2 min
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-init
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              psql "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME" \
                -f /schema/schema.sql
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: schema-vol
              mountPath: /schema
      volumes:
        - name: schema-vol
          configMap:
            name: schema-sql

---
# The SQL file itself, stored as a ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: schema-sql
  namespace: todo-app
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id          SERIAL PRIMARY KEY,
      email       VARCHAR(255) UNIQUE NOT NULL,
      password    VARCHAR(255) NOT NULL,
      is_premium  BOOLEAN NOT NULL DEFAULT FALSE,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS todos (
      id          SERIAL PRIMARY KEY,
      user_id     INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      title       VARCHAR(500) NOT NULL,
      completed   BOOLEAN NOT NULL DEFAULT FALSE,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_todos_user_id ON todos(user_id);
