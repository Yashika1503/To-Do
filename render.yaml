services:
  - type: web
    name: backend
    env: docker
    repo: https://github.com/Yashika1503/To-Do
    branch: main
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: JWT_SECRET
        value: your_super_secret
      - key: REDIS_HOST
        fromService:
          type: redis
          name: redis
          property: host

  - type: web
    name: frontend
    env: docker
    repo: https://github.com/Yashika1503/To-Do
    branch: main
    dockerfilePath: ./frontend/Dockerfile

  - type: redis
    name: redis